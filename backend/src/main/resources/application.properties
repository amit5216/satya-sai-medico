# ============================================================
# SERVER CONFIGURATION
# ============================================================
# Port on which our backend will run
# Default is 8080, but you can change it
server.port=8080

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
# JDBC URL format: jdbc:mysql://HOST:PORT/DATABASE_NAME
# We'll create a database called 'satya_sai_medico'
spring.datasource.url=jdbc:mysql://localhost:3306/satya_sai_medico?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true

# Your MySQL credentials
spring.datasource.username=root
spring.datasource.password=manager

# MySQL JDBC Driver class (auto-detected, but explicit is better)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================
# ddl-auto options:
#   create      → Drops & creates tables every restart (DATA LOST!)
#   create-drop → Same as create, but drops on shutdown
#   update      → Updates schema without losing data (RECOMMENDED for dev)
#   validate    → Only validates, no changes
#   none        → Does nothing (RECOMMENDED for production)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true

# Format the SQL queries for readability
spring.jpa.properties.hibernate.format_sql=true

# MySQL dialect tells Hibernate to generate MySQL-compatible SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT CONFIGURATION
# ============================================================
# Secret key for signing JWT tokens (use a strong random string in production)
app.jwt.secret=SatyaSaiMedico2026SecureJWTSecretKeyThatIsLongEnoughForHS512Algorithm
# Token validity: 24 hours (in milliseconds)
app.jwt.expiration=86400000

# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
spring.application.name=satya-sai-medico

# WhatsApp number for medicine inquiries (with country code)
app.whatsapp.number=917385312823
